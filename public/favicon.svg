<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Outer circle border -->
  <circle cx="64" cy="64" r="62" fill="#888" />
  <circle cx="64" cy="64" r="56" fill="#1a3a5c" />
  <!-- Sky/clouds hint -->
  <ellipse cx="40" cy="45" rx="22" ry="12" fill="#9ec5e0" opacity="0.5" />
  <ellipse cx="90" cy="40" rx="16" ry="10" fill="#9ec5e0" opacity="0.4" />
  <!-- Left smokestack -->
  <rect x="38" y="18" width="12" height="60" rx="2" fill="#fff" />
  <rect x="38" y="18" width="12" height="10" rx="2" fill="#cc2222" />
  <rect x="38" y="38" width="12" height="10" fill="#cc2222" />
  <rect x="38" y="58" width="12" height="10" fill="#cc2222" />
  <rect x="36" y="14" width="16" height="6" rx="2" fill="#cc2222" />
  <!-- Right smokestack -->
  <rect x="72" y="22" width="12" height="52" rx="2" fill="#fff" />
  <rect x="72" y="22" width="12" height="9" rx="2" fill="#cc2222" />
  <rect x="72" y="40" width="12" height="9" fill="#cc2222" />
  <rect x="72" y="56" width="12" height="9" fill="#cc2222" />
  <rect x="70" y="18" width="16" height="6" rx="2" fill="#cc2222" />
  <!-- Snake body coil -->
  <path d="M52 85 C40 80, 30 65, 38 52 C44 42, 55 40, 60 50 C65 58, 58 68, 64 75 C70 82, 82 78, 86 68 C90 58, 85 48, 78 52" stroke="#8B5E3C" stroke-width="12" fill="none" stroke-linecap="round" />
  <path d="M52 85 C40 80, 30 65, 38 52 C44 42, 55 40, 60 50 C65 58, 58 68, 64 75 C70 82, 82 78, 86 68 C90 58, 85 48, 78 52" stroke="#C4884D" stroke-width="8" fill="none" stroke-linecap="round" />
  <!-- Dark spots on snake -->
  <circle cx="42" cy="58" r="3" fill="#3d2b1f" />
  <circle cx="58" cy="52" r="2.5" fill="#3d2b1f" />
  <circle cx="70" cy="72" r="3" fill="#3d2b1f" />
  <circle cx="84" cy="62" r="2.5" fill="#3d2b1f" />
  <!-- Snake head -->
  <ellipse cx="50" cy="88" rx="10" ry="7" fill="#C4884D" />
  <ellipse cx="50" cy="88" rx="10" ry="7" fill="#8B5E3C" opacity="0.3" />
  <!-- Eye -->
  <circle cx="46" cy="86" r="2.5" fill="#2d8a4e" />
  <circle cx="46" cy="85.5" r="1" fill="#000" />
  <!-- Sparkle stars -->
  <path d="M96 34 L97.5 30 L99 34 L103 35.5 L99 37 L97.5 41 L96 37 L92 35.5 Z" fill="#f0c040" />
  <path d="M100 46 L101 43.5 L102 46 L104.5 47 L102 48 L101 50.5 L100 48 L97.5 47 Z" fill="#f0c040" />
  <!-- Bottom red/orange banner area -->
  <path d="M10 90 Q64 82 118 90 L118 120 Q64 128 10 120 Z" fill="url(#banner)" />
  <defs>
    <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc2222" />
      <stop offset="100%" stop-color="#e8a020" />
    </linearGradient>
  </defs>
</svg>
